<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff8f00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meal Calc">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=20260713133102">
  <title>Meal Calorie Calculator</title>
</head>
<body>
  <main class="app">
    <header class="app-head">
      <label class="meal-picker">
        <span class="visually-hidden">Meal</span>
        <select id="meal-select" aria-label="Select meal"></select>
      </label>
    </header>

    <section class="card" aria-label="Configurations">
      <div class="section-label">Presets &amp; saved</div>
      <div id="config-chips" class="chips"></div>
    </section>

    <section class="card total-card" aria-label="Whole meal total">
      <div class="section-label">Whole meal</div>
      <div class="total-row">
        <button id="total-down" class="step step-lg" type="button" aria-label="Decrease total by 5">−5</button>
        <div class="total-value">
          <input id="total-input" class="num total-num" type="number" step="5" min="0"
                 inputmode="numeric" aria-label="Total calories">
          <span class="unit">cal total</span>
        </div>
        <button id="total-up" class="step step-lg" type="button" aria-label="Increase total by 5">+5</button>
      </div>
      <p class="hint">Adjusting this number keeps ingredient ratios stable.</p>
    </section>

    <section class="card" aria-label="Ingredients">
      <div class="section-label">Ingredients</div>
      <div id="ingredients"></div>
    </section>
  </main>

  <!-- ?v= is a cache-busting token; run ./bump.sh before each deploy to refresh it -->
  <script src="meals.js?v=20260713133102"></script>
  <script src="app.js?v=20260713133102"></script>
</body>
</html>
